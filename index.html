<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1da2a3"/>
  <meta name="description" content="جدول المراجعة الذهبي - السادس الإعدادي العلمي"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="جدولي"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <title>جدول المراجعة الذهبي</title>
  <style>
    @font-face {
      font-family: 'ItfGhroob';
      src: url('https://framerusercontent.com/assets/WemXio0DsnMZkNGewKgMXHSJMA.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ItfGhroob';
      src: url('https://framerusercontent.com/assets/zA8VvNvMm9p6d5VbPbmp8fdsyk.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --blue: #1da2a3;
      --blue-dark: #148586;
      --blue-glow: rgba(29,162,163,0.35);
      --black: #111;
      --white: #fff;
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.12);
      --done-opacity: 0.28;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'ItfGhroob', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Liquid background blobs */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: blobFloat 12s ease-in-out infinite;
    }
    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(29,162,163,0.18) 0%, transparent 70%);
      top: -200px; right: -200px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(29,162,163,0.12) 0%, transparent 70%);
      bottom: 20%; left: -150px;
      animation-delay: -4s;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(29,162,163,0.08) 0%, transparent 70%);
      top: 50%; right: 10%;
      animation-delay: -8s;
    }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(30px,-40px) scale(1.05); }
      66% { transform: translate(-20px,20px) scale(0.95); }
    }

    /* Noise texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
      opacity: 0.4;
    }

    .app { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: 0 16px 80px; }

    /* HEADER */
    header {
      text-align: center;
      padding: 48px 0 32px;
      position: relative;
    }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--blue);
      margin-bottom: 20px;
      backdrop-filter: blur(12px);
    }
    h1 {
      font-size: clamp(28px, 7vw, 56px);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--white) 0%, var(--blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.45);
      font-weight: 400;
    }

    /* LIVE CLOCK */
    .live-clock {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 28px 0;
      flex-wrap: wrap;
    }
    .clock-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 12px 20px;
      backdrop-filter: blur(16px);
      text-align: center;
      min-width: 120px;
    }
    .clock-label {
      font-size: 11px;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .clock-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
    }
    .clock-value.time-display { font-size: 28px; color: var(--blue); }

    /* TODAY HIGHLIGHT */
    .today-card {
      background: linear-gradient(135deg, rgba(29,162,163,0.15), rgba(29,162,163,0.05));
      border: 1px solid rgba(29,162,163,0.4);
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 32px;
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .today-icon {
      width: 48px; height: 48px;
      background: var(--blue);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--blue-glow);
    }
    .today-info { flex: 1; min-width: 200px; }
    .today-label { font-size: 12px; color: var(--blue); margin-bottom: 4px; }
    .today-subject { font-size: 20px; font-weight: 700; }
    .today-detail { font-size: 14px; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .today-extra { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .tag {
      background: rgba(29,162,163,0.15);
      border: 1px solid rgba(29,162,163,0.3);
      border-radius: 100px;
      padding: 3px 12px;
      font-size: 12px;
      color: var(--blue);
    }

    /* PROGRESS */
    .progress-section { margin-bottom: 32px; }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .progress-title { font-size: 15px; font-weight: 700; }
    .progress-pct { font-size: 15px; color: var(--blue); font-weight: 700; }
    .progress-bar-wrap {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue-dark), var(--blue));
      border-radius: 100px;
      transition: width 1s ease;
      box-shadow: 0 0 10px var(--blue-glow);
    }

    /* SUBJECT TABS */
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 28px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      padding: 8px 18px;
      font-family: 'ItfGhroob', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .tab:hover { border-color: var(--blue); color: var(--white); }
    .tab.active {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
      box-shadow: 0 0 16px var(--blue-glow);
    }
    .tab.done-tab { opacity: 0.4; }

    /* SUBJECT SECTION */
    .subject-section { margin-bottom: 40px; }
    .subject-section.is-done { opacity: var(--done-opacity); pointer-events: none; transition: opacity 0.5s; }

    .subject-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      padding: 16px 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }
    .subject-header::before {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--blue);
      box-shadow: 0 0 12px var(--blue-glow);
    }
    .subject-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, rgba(29,162,163,0.25), rgba(29,162,163,0.1));
      border: 1px solid rgba(29,162,163,0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .subject-name { font-size: 20px; font-weight: 700; flex: 1; }
    .subject-meta { font-size: 13px; color: rgba(255,255,255,0.4); }
    .subject-dates { font-size: 12px; color: var(--blue); margin-top: 2px; }
    .done-badge {
      background: rgba(29,162,163,0.2);
      border: 1px solid var(--blue);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--blue);
    }

    /* DAY CARDS */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .day-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .day-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(29,162,163,0.06), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .day-card:hover::after { opacity: 1; }
    .day-card:hover { border-color: rgba(29,162,163,0.4); transform: translateY(-2px); }
    .day-card.is-today {
      border-color: var(--blue);
      box-shadow: 0 0 24px var(--blue-glow), inset 0 0 24px rgba(29,162,163,0.05);
    }
    .day-card.is-today::before {
      content: 'اليوم';
      position: absolute;
      top: 10px;
      left: 12px;
      background: var(--blue);
      border-radius: 100px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 0 10px var(--blue-glow);
    }
    .day-card.is-past {
      opacity: 0.4;
    }
    .day-card.is-checked {
      border-color: rgba(29,162,163,0.5);
      background: rgba(29,162,163,0.08);
    }

    .day-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .day-date-wrap { display: flex; align-items: center; gap: 8px; }
    .day-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--blue);
      line-height: 1;
    }
    .day-info { display: flex; flex-direction: column; }
    .day-name { font-size: 13px; color: rgba(255,255,255,0.5); }
    .day-month { font-size: 11px; color: rgba(255,255,255,0.3); }

    .check-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .check-btn:hover { border-color: var(--blue); color: var(--blue); }
    .day-card.is-checked .check-btn {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
      box-shadow: 0 0 10px var(--blue-glow);
    }

    .day-subject {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .day-extras {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .extra-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
    }
    .extra-item i { color: var(--blue); font-size: 10px; }

    .rest-card { border-color: rgba(255,255,255,0.08); }
    .rest-card .day-subject { color: rgba(255,255,255,0.4); }

    /* COUNTDOWN */
    .countdown-section {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 32px;
      backdrop-filter: blur(16px);
      text-align: center;
    }
    .countdown-title {
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }
    .countdown-grid {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .countdown-unit {
      background: rgba(29,162,163,0.1);
      border: 1px solid rgba(29,162,163,0.2);
      border-radius: 14px;
      padding: 12px 16px;
      min-width: 70px;
    }
    .countdown-num {
      font-size: 32px;
      font-weight: 700;
      color: var(--blue);
      line-height: 1;
    }
    .countdown-lbl {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    /* INSTALL BANNER */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(17,17,17,0.95);
      border: 1px solid var(--blue);
      border-radius: 16px;
      padding: 14px 20px;
      z-index: 999;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 30px var(--blue-glow);
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 340px;
      width: calc(100% - 32px);
    }
    #install-banner.hidden { display: none !important; }
    .install-text { flex: 1; font-size: 14px; }
    .install-text strong { color: var(--blue); }
    .install-btn {
      background: var(--blue);
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      color: var(--white);
      font-family: 'ItfGhroob', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .install-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .subject-section { animation: fadeInUp 0.5s ease both; }
    .subject-section:nth-child(1) { animation-delay: 0.05s; }
    .subject-section:nth-child(2) { animation-delay: 0.10s; }
    .subject-section:nth-child(3) { animation-delay: 0.15s; }
    .subject-section:nth-child(4) { animation-delay: 0.20s; }
    .subject-section:nth-child(5) { animation-delay: 0.25s; }
    .subject-section:nth-child(6) { animation-delay: 0.30s; }
    .subject-section:nth-child(7) { animation-delay: 0.35s; }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 24px var(--blue-glow); }
      50% { box-shadow: 0 0 40px rgba(29,162,163,0.5); }
    }
    .day-card.is-today { animation: pulse-glow 3s ease-in-out infinite; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(29,162,163,0.3); border-radius: 3px; }

    /* MOBILE */
    @media (max-width: 600px) {
      .days-grid { grid-template-columns: 1fr; }
      .live-clock { gap: 10px; }
      .clock-card { min-width: 90px; padding: 10px 14px; }
    }
  </style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="app">

  <header>
    <div class="header-badge">
      <i class="fas fa-trophy"></i>
      جدول أوائل العراق
    </div>
    <h1>جدول المراجعة الذهبي</h1>
    <p class="subtitle">السادس الإعدادي العلمي — قناة وزاري</p>
  </header>

  <!-- LIVE CLOCK -->
  <div class="live-clock">
    <div class="clock-card">
      <div class="clock-label"><i class="fas fa-calendar-day"></i> اليوم</div>
      <div class="clock-value" id="today-day">—</div>
    </div>
    <div class="clock-card">
      <div class="clock-label"><i class="fas fa-clock"></i> الوقت</div>
      <div class="clock-value time-display" id="live-time">—</div>
    </div>
    <div class="clock-card">
      <div class="clock-label"><i class="fas fa-calendar"></i> التاريخ</div>
      <div class="clock-value" id="today-date">—</div>
    </div>
  </div>

  <!-- TODAY CARD -->
  <div class="today-card" id="today-card">
    <div class="today-icon"><i class="fas fa-star"></i></div>
    <div class="today-info">
      <div class="today-label">مهمة اليوم</div>
      <div class="today-subject" id="today-subject">جاري التحميل...</div>
      <div class="today-detail" id="today-detail"></div>
      <div class="today-extra" id="today-extra"></div>
    </div>
  </div>

  <!-- COUNTDOWN TO END -->
  <div class="countdown-section">
    <div class="countdown-title"><i class="fas fa-flag-checkered"></i> الوقت المتبقي لنهاية المراجعة الأولى (11 مايو)</div>
    <div class="countdown-grid">
      <div class="countdown-unit"><div class="countdown-num" id="cd-days">—</div><div class="countdown-lbl">يوم</div></div>
      <div class="countdown-unit"><div class="countdown-num" id="cd-hours">—</div><div class="countdown-lbl">ساعة</div></div>
      <div class="countdown-unit"><div class="countdown-num" id="cd-mins">—</div><div class="countdown-lbl">دقيقة</div></div>
      <div class="countdown-unit"><div class="countdown-num" id="cd-secs">—</div><div class="countdown-lbl">ثانية</div></div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title"><i class="fas fa-chart-line"></i> تقدمك الكلي</span>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- SCHEDULE CONTENT -->
  <div id="schedule"></div>

</div>

<!-- INSTALL BANNER -->
<div id="install-banner" class="hidden">
  <div class="install-text"><strong>ثبّت التطبيق</strong><br/>وصول سريع من الشاشة الرئيسية</div>
  <button class="install-btn" id="install-btn">تثبيت</button>
  <button class="install-close" id="install-close"><i class="fas fa-times"></i></button>
</div>

<script>
// ========== DATA ==========
const SUBJECTS = [
  {
    id: 'math',
    name: 'الرياضيات',
    icon: 'fa-square-root-variable',
    color: '#1da2a3',
    days: [
      { date: '2025-03-30', day: 'الأحد',    subject: 'فصل أول رياضيات',    adab: 'محمد علي الكفاجي', islam: 'سورة البقرة' },
      { date: '2025-03-31', day: 'الاثنين',  subject: 'فصل ثاني رياضيات',   adab: 'المسرحية',         islam: null },
      { date: '2025-04-01', day: 'الثلاثاء', subject: 'فصل ثالث رياضيات',   adab: 'محمود درويش',      islam: 'قصة أصحاب الكهف + حديث التعاون' },
      { date: '2025-04-02', day: 'الأربعاء', subject: 'فصل رابع رياضيات',   adab: 'فدوى طوقان',       islam: null },
      { date: '2025-04-03', day: 'الخميس',   subject: 'فصل خامس رياضيات',   adab: 'شعر القضية الفلسطينية', islam: 'نظام الأسرة ج1' },
      { date: '2025-04-04', day: 'الجمعة',   subject: 'نسخ وزارية (5-10 نسخ)', adab: 'أدونيس',         islam: null },
    ]
  },
  {
    id: 'english',
    name: 'الإنجليزي',
    icon: 'fa-book-open',
    color: '#1da2a3',
    days: [

// ========== STATE ==========
const STORAGE_KEY = 'schedule_checked_v1';
let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

function saveChecked() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
}

// ========== HELPERS ==========
function getTodayStr() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

function isPast(dateStr) {
  return dateStr < getTodayStr();
}
function isToday(dateStr) {
  return dateStr === getTodayStr();
}

function formatDateAr(dateStr) {
  const [y,m,d] = dateStr.split('-');
  return `${parseInt(d)}/${parseInt(m)}`;
}

const DAY_NAMES = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTH_NAMES = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

// ========== CLOCK ==========
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const min = String(now.getMinutes()).padStart(2,'0');
  const sec = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('live-time').textContent = `${h}:${min}:${sec}`;
  document.getElementById('today-day').textContent = DAY_NAMES[now.getDay()];
  document.getElementById('today-date').textContent = `${now.getDate()} ${MONTH_NAMES[now.getMonth()]}`;

  // Countdown to May 11
  const target = new Date('2025-05-11T23:59:59');
  const diff = target - now;
  if (diff > 0) {
    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    document.getElementById('cd-days').textContent = days;
    document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
    document.getElementById('cd-mins').textContent = String(mins).padStart(2,'0');
    document.getElementById('cd-secs').textContent = String(secs).padStart(2,'0');
  } else {
    document.getElementById('cd-days').textContent = '0';
    document.getElementById('cd-hours').textContent = '00';
    document.getElementById('cd-mins').textContent = '00';
    document.getElementById('cd-secs').textContent = '00';
  }
}

// ========== TODAY CARD ==========
function updateTodayCard() {
  const today = getTodayStr();
  let found = null;
  for (const subj of SUBJECTS) {
    for (const d of subj.days) {
      if (d.date === today) { found = { subj, d }; break; }
    }
    if (found) break;
  }
  const card = document.getElementById('today-card');
  if (!found) {
    document.getElementById('today-subject').textContent = 'لا توجد مهمة اليوم';
    document.getElementById('today-detail').textContent = 'خذ راحة أو راجع ما فاتك 💙';
    return;
  }
  const icon = card.querySelector('.today-icon i');
  icon.className = `fas ${found.subj.icon}`;
  document.getElementById('today-subject').textContent = found.d.subject;
  document.getElementById('today-detail').textContent = `${found.subj.name} — ${found.d.day} ${formatDateAr(found.d.date)}`;
  const extra = document.getElementById('today-extra');
  extra.innerHTML = '';
  if (found.d.adab) extra.innerHTML += `<span class="tag"><i class="fas fa-feather"></i> أدب: ${found.d.adab}</span>`;
  if (found.d.islam) extra.innerHTML += `<span class="tag"><i class="fas fa-moon"></i> إسلامية: ${found.d.islam}</span>`;
}

// ========== PROGRESS ==========
function updateProgress() {
  let total = 0, done = 0;
  SUBJECTS.forEach(s => s.days.forEach(d => {
    if (!d.isRest) {
      total++;
      if (checked[d.date]) done++;
    }
  }));
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ========== RENDER ==========
function isSubjectDone(subj) {
  if (subj.id === 'rest') return false;
  return subj.days.every(d => d.isRest || checked[d.date] || isPast(d.date));
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = `<button class="tab active" data-id="all">الكل</button>`;
  SUBJECTS.forEach(s => {
    const done = isSubjectDone(s);
    tabs.innerHTML += `<button class="tab ${done?'done-tab':''}" data-id="${s.id}">
      <i class="fas ${s.icon}"></i> ${s.name}
    </button>`;
  });
  tabs.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterSchedule(btn.dataset.id);
    });
  });
}

function filterSchedule(id) {
  document.querySelectorAll('.subject-section').forEach(sec => {
    sec.style.display = (id === 'all' || sec.dataset.id === id) ? '' : 'none';
  });
}

function renderSchedule() {
  const container = document.getElementById('schedule');
  container.innerHTML = '';

  SUBJECTS.forEach(subj => {
    const allDaysDone = isSubjectDone(subj);
    const sec = document.createElement('div');
    sec.className = `subject-section ${allDaysDone ? 'is-done' : ''}`;
    sec.dataset.id = subj.id;

    // Header
    const datesRange = `${formatDateAr(subj.days[0].date)} ← ${formatDateAr(subj.days[subj.days.length-1].date)}`;
    sec.innerHTML = `
      <div class="subject-header">
        <div class="subject-icon"><i class="fas ${subj.icon}"></i></div>
        <div style="flex:1">
          <div class="subject-name">${subj.name}</div>
          <div class="subject-meta">${subj.days.length} ${subj.id==='rest'?'يوم':'أيام'}</div>
          <div class="subject-dates"><i class="fas fa-calendar-range"></i> ${datesRange}</div>
        </div>
        ${allDaysDone ? '<span class="done-badge"><i class="fas fa-check-circle"></i> مكتملة</span>' : ''}
      </div>
      <div class="days-grid"></div>
    `;

    const grid = sec.querySelector('.days-grid');

    subj.days.forEach(d => {
      const card = document.createElement('div');
      const past = isPast(d.date);
      const today = isToday(d.date);
      const isChecked = !!checked[d.date];

      card.className = `day-card ${today?'is-today':''} ${past&&!today?'is-past':''} ${isChecked?'is-checked':''} ${d.isRest?'rest-card':''}`;

      const [,m,day] = d.date.split('-');
      card.innerHTML = `
        <div class="day-top">
          <div class="day-date-wrap">
            <div class="day-num">${parseInt(day)}</div>
            <div class="day-info">
              <span class="day-name">${d.day}</span>
              <span class="day-month">${MONTH_NAMES[parseInt(m)-1]}</span>
            </div>
          </div>
          ${d.isRest ? '' : `<button class="check-btn" data-date="${d.date}"><i class="fas fa-check"></i></button>`}
        </div>
        <div class="day-subject">${d.subject}</div>
        <div class="day-extras">
          ${d.adab ? `<div class="extra-item"><i class="fas fa-feather-pointed"></i> أدب: ${d.adab}</div>` : ''}
          ${d.islam ? `<div class="extra-item"><i class="fas fa-star-and-crescent"></i> إسلامية: ${d.islam}</div>` : ''}
        </div>
      `;

      const btn = card.querySelector('.check-btn');
      if (btn) {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const date = btn.dataset.date;
          checked[date] = !checked[date];
          saveChecked();
          renderSchedule();
          renderTabs();
          updateProgress();
        });
      }

      grid.appendChild(card);
    });

    container.appendChild(sec);
  });
}

// ========== PWA ==========
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  banner.classList.remove('hidden');
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.add('hidden');
});

document.getElementById('install-close').addEventListener('click', () => {
  document.getElementById('install-banner').classList.add('hidden');
});

// ========== INIT ==========
renderTabs();
renderSchedule();
updateProgress();
updateTodayCard();
updateClock();
setInterval(updateClock, 1000);

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
